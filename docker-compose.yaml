# Test/pilot deployment: web portal + query API + Neo4j + continuous indexer.
# Copy .env.example to .env, fill it in, then: docker compose up -d --build
#
# Engineers reach the portal at http://<host>:${WEB_PORT}. Their Claude Code
# MCP setup points QUERY_SERVICE_URL at http://<host>:8080 only if you also
# publish that port (commented out below) — otherwise MCP users go through
# the same host but need the bearer token.
services:
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?set NEO4J_PASSWORD in .env}
    volumes:
      - neo4j-data:/data
    # Published on loopback only — for operator debugging with the Neo4j
    # browser. The compose network is how services reach it.
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  query-service:
    build:
      context: .
      dockerfile: deploy/Dockerfile.query-service
    environment:
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?}
      QUERY_AUTH_TOKEN: ${QUERY_AUTH_TOKEN:?set QUERY_AUTH_TOKEN in .env}
      QUERY_BIND: 0.0.0.0 # container-internal; only the web proxy can reach it
    depends_on:
      neo4j:
        condition: service_healthy
    # Uncomment to let MCP clients (engineers' Claude Code) reach the API
    # directly with the bearer token:
    # ports:
    #   - "8080:8080"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    environment:
      QUERY_AUTH_TOKEN: ${QUERY_AUTH_TOKEN:?}
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - query-service
    restart: unless-stopped

  indexer:
    build:
      context: .
      dockerfile: deploy/Dockerfile.indexer
    environment:
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      INDEX_INTERVAL: ${INDEX_INTERVAL:-1h}
    volumes:
      - indexer-workdir:/workdir
      - ./config:/app/config:ro
      # For SSH-based git auth instead of GITHUB_TOKEN, mount keys:
      # - ~/.ssh:/root/.ssh:ro
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

volumes:
  neo4j-data:
  indexer-workdir:
