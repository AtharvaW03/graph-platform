# Compose smoke-test config: one small, real public repo so `docker compose
# up` proves the full pipeline (clone -> graphify -> import) without cloning
# the whole org. Swap in a real config/repos.yaml for actual use.

repositories:
  - name: color
    url: https://github.com/fatih/color.git
    branch: main

# Invocation settings (command/args/output_file/timeout) default from the
# code (extract --code-only --force); set them here only to override.
graphify:
  expected_version: "0.9.20" # must match the graphifyy version pinned in the Docker image

extractors:
  deps: true
  http_api: true
  kafka: true
  mssql: true
  glue: true

org:
  prefixes: []
