# Indexer configuration.
#
# `repositories` is the manifest of repos the indexer keeps in sync and
# imports into Neo4j. Each entry must have a unique name; the name is the
# stable identifier used as the (:Repository {name}) node in the graph and
# as the key in state.json, so renaming a repo forces a re-index from
# scratch.
#
# `graphify` controls how the AST extractor is invoked. Invocation settings
# (command, args, output_file, timeout) default from the code - currently
# `graphify extract <repo_path> --code-only --force`, a 20m timeout, and
# output at `<repo_path>/graphify-out/graph.json` - and belong in this file
# only to OVERRIDE a default. Don't mirror the defaults here: a stale copy
# silently wins over the code. The only supported placeholder in args is
# {repo_path}; output_file is resolved relative to it.
#
# `extractors` enables/disables the platform's domain extractors. They run
# after graphify and emit Graphify-compatible fragments that are merged
# into the unified graph.json before import. Leave a key unset to keep the
# default (enabled).
#
# `org.prefixes` are package-name prefixes that identify internal repos so
# the deps extractor can emit DEPENDS_ON_REPO edges for cross-repo lookups.
# Match the org's package namespace conventions.

repositories:
  - name: auth-service
    url: https://github.com/example-org/auth-service.git
    branch: main

  - name: payments-service
    url: https://github.com/example-org/payments-service.git
    branch: main

  - name: orders-service
    url: https://github.com/example-org/orders-service.git
    branch: main

git:
  timeout: 10m

graphify:
  expected_version: "0.9.20" # must match the graphifyy version pinned in the Docker image
  # ignore_patterns: ["*.tfvars"]  # appended to every checkout's .graphifyignore; this is the default

extractors:
  deps: true
  http_api: true
  kafka: true
  mssql: true
  glue: true
  max_parallel: 0 # 0 = all in parallel

org:
  prefixes:
    - github.com/example-org/
