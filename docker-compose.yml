services:
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  query-service:
    build:
      context: .
      dockerfile: deploy/Dockerfile.query-service
    environment:
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      QUERY_BIND: 0.0.0.0
      QUERY_AUTH_TOKEN: ${QUERY_AUTH_TOKEN:-}
    ports:
      - "8080:8080"
    depends_on:
      neo4j:
        condition: service_healthy

  # One-shot by default (--all with no --interval). Swap config/repos.docker.yaml
  # for a real config, or override `command` to add --interval for continuous mode.
  indexer:
    build:
      context: .
      dockerfile: deploy/Dockerfile.indexer
    environment:
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      GIT_TOKEN: ${GIT_TOKEN:-}
    volumes:
      - indexer-workdir:/app/workdir
      - ./config/repos.docker.yaml:/app/config/repos.docker.yaml:ro
    command: ["/usr/local/bin/indexer", "--config", "config/repos.docker.yaml", "--all"]
    depends_on:
      neo4j:
        condition: service_healthy

  web:
    build:
      context: web
      dockerfile: Dockerfile
    environment:
      QUERY_SERVICE_URL: http://query-service:8080
      QUERY_AUTH_TOKEN: ${QUERY_AUTH_TOKEN:-}
    ports:
      - "5173:80"
    depends_on:
      - query-service

volumes:
  neo4j-data:
  indexer-workdir:
